name: CI/CD Pipeline

on:
  push:
    branches:
      - main

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Integración Continua (CI)
  # ─────────────────────────────────────────────
  ci:
    name: Integración Continua
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código fuente
        uses: actions/checkout@v4

      - name: Verificar existencia de home.html
        run: |
          if [ -f "home.html" ]; then
            echo "✅ home.html encontrado."
          else
            echo "❌ ERROR: home.html no existe en el repositorio."
            exit 1
          fi

      - name: Verificar existencia de styles.css
        run: |
          if [ -f "styles.css" ]; then
            echo "✅ styles.css encontrado."
          else
            echo "❌ ERROR: styles.css no existe en el repositorio."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 2 – Despliegue Continuo (CD)
  # ─────────────────────────────────────────────
  cd:
    name: Despliegue Continuo
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Obtener el código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar el proyecto
        run: |
          echo "🚀 Iniciando preparación del despliegue..."
          echo "📦 Compilando y empaquetando artefactos..."
          npm run build
          echo "✅ Artefactos listos para el despliegue en el entorno de Staging."

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefactos a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
