name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Integración Continua (CI)
  # Se ejecuta en cada push a main y verifica
  # que los archivos requeridos existan.
  # ─────────────────────────────────────────────
  ci:
    name: Integración Continua
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código fuente
        uses: actions/checkout@v4

      - name: Verificar existencia de home.html
        run: |
          if [ -f "home.html" ]; then
            echo "✅ home.html encontrado."
          else
            echo "❌ ERROR: home.html no existe en el repositorio."
            exit 1
          fi

      - name: Verificar existencia de styles.css
        run: |
          if [ -f "styles.css" ]; then
            echo "✅ styles.css encontrado."
          else
            echo "❌ ERROR: styles.css no existe en el repositorio."
            exit 1
          fi

  # ─────────────────────────────────────────────
  # JOB 2 – Despliegue Continuo (CD)
  # Compila el proyecto y lo despliega en
  # GitHub Pages para pruebas.
  # ─────────────────────────────────────────────
  cd:
    name: Despliegue Continuo
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Obtener el código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar artefactos
        run: |
          echo "🚀 Iniciando preparación del despliegue..."
          echo "📦 Compilando y empaquetando artefactos..."
          npm run build
          echo "✅ Artefactos listos para el despliegue en el entorno de Staging."

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
