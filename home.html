<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronóstico del Clima</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Pronóstico del Clima</h1>
    <p>Consulta el clima de cualquier ciudad del mundo</p>
  </header>

  <main>
    <section class="search-section">
      <label for="city">Ciudad:</label>
      <input type="text" id="city" placeholder="Ingresa una ciudad..." />
      <button type="button">Buscar</button>
    </section>

    <section class="weather-info">
      <h2>Información del clima</h2>
      <p>Temperatura: <span id="temp">--</span> °C</p>
      <p>Humedad: <span id="humidity">--</span> %</p>
      <p>Condición: <span id="condition">--</span></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Pronóstico del Clima</p>
  </footer>
</body>
</html>
